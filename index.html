<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    .card-hover { transition: all 0.3s; }
    .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .modal { animation: pop 0.3s ease-out; }
    @keyframes pop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

    .btn-preview { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .btn-order { background: linear-gradient(135deg, #10b981, #059669); }

    .modal-content {
      max-height: 90vh;
      overflow-y: auto;
    }
  </style>
</head>

<body class="bg-gray-50 font-sans">

<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-emerald-600">KatalogKu</h1>
  </div>
</header>

<div class="max-w-7xl mx-auto px-4 py-6">

  <input id="searchInput" onkeyup="filterProducts()" type="text"
    placeholder="Cari produk..."
    class="w-full px-5 py-3 mb-6 rounded-xl border">

  <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>

<script>
/* ================= DATA ================= */
let products = [];

/* ================= LOAD JSON ================= */
async function loadProducts() {
  try {
    const res = await fetch('data.json');

    if (!res.ok) throw new Error('Gagal load');

    const data = await res.json();

    if (!Array.isArray(data)) throw new Error('Format salah');

    products = data;
    renderCatalog(products);

  } catch (err) {
    console.error(err);
    alert('Gagal memuat data.json');
  }
}

/* ================= RENDER ================= */
function renderCatalog(data) {
  const grid = document.getElementById('catalogGrid');

  grid.innerHTML = data.map(p => `
    <div class="card-hover bg-white rounded-2xl shadow p-4">
      <img src="${p.image}" class="w-full h-48 object-cover rounded-xl mb-3">

      <h3 class="font-semibold text-lg">${p.title}</h3>
      <p class="text-emerald-600 font-bold mb-2">
        Rp ${p.price.toLocaleString('id-ID')}
      </p>

      <p class="text-sm text-gray-600 mb-3">
        ${p.description.substring(0, 80)}...
      </p>

      <button onclick="orderNow(${p.id})"
        class="btn-order w-full text-white py-2 rounded-xl">
        Order
      </button>
    </div>
  `).join('');
}

/* ================= SEARCH ================= */
function filterProducts() {
  const keyword = document.getElementById('searchInput').value.toLowerCase();

  const filtered = products.filter(p =>
    p.title.toLowerCase().includes(keyword) ||
    p.description.toLowerCase().includes(keyword)
  );

  renderCatalog(filtered);
}

/* ================= ORDER ================= */
function orderNow(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;

  const msg = `Halo, saya ingin pesan:\n${p.title}\nRp ${p.price.toLocaleString('id-ID')}`;

  window.open(`https://wa.me/6285712130175?text=${encodeURIComponent(msg)}`);
}

/* ================= INIT ================= */
window.onload = loadProducts;
</script>

</body>
</html>
