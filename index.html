<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk - Toko Online</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1 class="logo">🛍️ Toko Kami</h1>
            <p class="tagline">Produk Berkualitas Dengan Harga Terjangkau</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Katalog Grid -->
        <section class="katalog-section">
            <h2 class="section-title">Daftar Produk</h2>
            <div class="katalog-grid" id="katalogGrid">
                <!-- Produk akan di-generate oleh JavaScript -->
            </div>
        </section>
    </main>

    <!-- Modal Detail Produk -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            
            <div class="modal-body">
                <!-- Foto Carousel -->
                <div class="foto-container">
                    <img class="foto-utama" id="fotoUtama" src="" alt="Foto Produk">
                    <div class="foto-nav">
                        <button class="foto-btn prev" id="prevFoto">❮</button>
                        <button class="foto-btn next" id="nextFoto">❯</button>
                    </div>
                    <div class="foto-indicator" id="fotoIndicator"></div>
                </div>

                <!-- Detail Produk -->
                <div class="detail-produk">
                    <h2 class="nama-produk" id="namaProduk"></h2>
                    <p class="deskripsi" id="deskripsi"></p>
                    
                    <div class="spesifikasi" id="spesifikasi"></div>
                    
                    <div class="harga-section">
                        <span class="label-harga">Harga:</span>
                        <span class="harga" id="hargaProduk"></span>
                    </div>

                    <button class="btn-beli">Pesan Sekarang</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Toko Kami. Semua hak dilindungi.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
